<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Litpax Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <!-- LOGIN -->
  <div class="view login-wrap" id="loginView" style="display:flex">
    <div class="login-card">
      <div class="login-logo"><i class="ti ti-lock"></i></div>
      <div class="login-title">Admin Panel</div>
      <div class="login-sub">Litpax Departments Hub</div>
      <input type="password" id="passwordInput" placeholder="Password dalein..." />
      <button id="loginBtn">Login</button>
      <div id="loginError"></div>
    </div>
  </div>

  <!-- ADMIN VIEW -->
  <div class="view" id="adminView">
    <div class="admin-header">
      <div class="admin-header-left">
        <div class="admin-logo-sm"><i class="ti ti-layout-grid"></i></div>
        <div>
          <div class="admin-title">Admin Panel</div>
          <div class="admin-sub">Litpax Departments Hub</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()"><i class="ti ti-logout"></i> Logout</button>
    </div>

    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('depts')"><i class="ti ti-building"></i> Departments</button>
      <button class="tab-btn" onclick="switchTab('forms')"><i class="ti ti-forms"></i> Forms</button>
      <button class="tab-btn" onclick="switchTab('notice')"><i class="ti ti-speakerphone"></i> Notice Board</button>
      <button class="tab-btn" onclick="switchTab('banner')"><i class="ti ti-bell-ringing"></i> Banner</button>
    </div>

    <!-- Departments -->
    <div class="tab-content" id="tab-depts" style="display:block">
      <div class="section-header"><h3>All Departments</h3><button class="btn-add" onclick="newDept()"><i class="ti ti-plus"></i> Add</button></div>
      <div id="adminDeptList"></div>
    </div>

    <!-- Forms -->
    <div class="tab-content" id="tab-forms">
      <div class="section-header"><h3>All Forms</h3><button class="btn-add" onclick="newForm()"><i class="ti ti-plus"></i> Add</button></div>
      <div class="filter-row"><select id="formDeptFilter" onchange="renderAdminForms()"><option value="">All Departments</option></select></div>
      <div id="adminFormList"></div>
    </div>

    <!-- Notice Board -->
    <div class="tab-content" id="tab-notice">
      <div class="section-header"><h3>Notice Board</h3><button class="btn-add" onclick="showModal('noticeModal')"><i class="ti ti-plus"></i> Add Notice</button></div>
      <div id="adminNoticeList"></div>
    </div>

    <!-- Announcement Banner -->
    <div class="tab-content" id="tab-banner">
      <div class="section-header"><h3>Announcement Banner</h3></div>
      <div class="banner-form">
        <div class="banner-preview" id="bannerPreview">
          <i class="ti ti-speakerphone"></i>
          <span id="bannerPreviewText">Banner preview here...</span>
        </div>
        <div class="form-group">
          <label>Banner Message</label>
          <input type="text" id="bannerMessage" placeholder="Important announcement..." />
        </div>
        <div class="form-group">
          <label>Color</label>
          <div class="color-options">
            <label class="color-opt red">
              <input type="radio" name="bannerColor" value="red" checked />
              <span>🔴 Red (Urgent)</span>
            </label>
            <label class="color-opt yellow">
              <input type="radio" name="bannerColor" value="yellow" />
              <span>🟠 Orange (General)</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label>Status</label>
          <div class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="bannerActive" onchange="updateBannerPreview()" />
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label" id="toggleLabel">Banner OFF</span>
          </div>
        </div>
        <button class="btn-save" id="saveBannerBtn" onclick="saveBanner()">
          <i class="ti ti-check"></i> Save Banner
        </button>
      </div>
    </div>
  </div>

  <!-- DEPT MODAL -->
  <div class="modal-overlay" id="deptModal">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title" id="deptModalTitle">Add Department</div><button class="modal-close" onclick="closeModal('deptModal')"><i class="ti ti-x"></i></button></div>
      <div class="form-group"><label>ID (lowercase, no spaces)</label><input type="text" id="deptId" placeholder="e.g. store" /></div>
      <div class="form-group"><label>Name</label><input type="text" id="deptName" placeholder="e.g. Store" /></div>
      <div class="form-group"><label>Icon (Tabler icon)</label><input type="text" id="deptIcon" placeholder="e.g. ti-package" /></div>
      <div class="form-group"><label>Color</label><input type="color" id="deptColor" value="#185FA5" /></div>
      <div class="form-group"><label>Order</label><input type="number" id="deptOrder" value="99" /></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('deptModal')">Cancel</button>
        <button class="btn-save" id="saveDeptBtn" onclick="saveDept()">Save</button>
      </div>
    </div>
  </div>

  <!-- FORM MODAL -->
  <div class="modal-overlay" id="formModal">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title" id="formModalTitle">Add Form</div><button class="modal-close" onclick="closeModal('formModal')"><i class="ti ti-x"></i></button></div>
      <input type="hidden" id="formId" />
      <div class="form-group"><label>Department</label><select id="formDeptId"></select></div>
      <div class="form-group"><label>Form Name</label><input type="text" id="formName" placeholder="e.g. Raw Material Inward Form" /></div>
      <div class="form-group"><label>Form URL</label><input type="url" id="formUrl" placeholder="https://docs.google.com/forms/..." /></div>
      <div class="form-group"><label>Type</label><select id="formType"><option value="Google Form">Google Form</option><option value="Web Form">Web Form</option></select></div>
      <div class="form-group"><label>Order</label><input type="number" id="formOrder" value="99" /></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('formModal')">Cancel</button>
        <button class="btn-save" id="saveFormBtn" onclick="saveForm()">Save</button>
      </div>
    </div>
  </div>

  <!-- NOTICE MODAL -->
  <div class="modal-overlay" id="noticeModal">
    <div class="modal-box">
      <div class="modal-header"><div class="modal-title">New Notice</div><button class="modal-close" onclick="closeModal('noticeModal')"><i class="ti ti-x"></i></button></div>
      <div class="form-group"><label>Notice Message</label><textarea id="noticeInput" rows="4" placeholder="Notice likhein..."></textarea></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('noticeModal')">Cancel</button>
        <button class="btn-save" id="saveNoticeBtn" onclick="saveNotice()">Post Notice</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
