<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Litpax Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <!-- ── LOGIN VIEW ── -->
  <div class="view login-wrap" id="loginView" style="display:flex">
    <div class="login-card">
      <div class="login-logo"><i class="ti ti-lock"></i></div>
      <div class="login-title">Admin Panel</div>
      <div class="login-sub">Litpax Departments Hub</div>
      <input type="password" id="passwordInput" placeholder="Password dalein..." />
      <button id="loginBtn">Login</button>
      <div id="loginError"></div>
    </div>
  </div>

  <!-- ── ADMIN VIEW ── -->
  <div class="view" id="adminView">

    <!-- Header -->
    <div class="admin-header">
      <div class="admin-header-left">
        <div class="admin-logo-sm"><i class="ti ti-layout-grid"></i></div>
        <div>
          <div class="admin-title">Admin Panel</div>
          <div class="admin-sub">Litpax Departments Hub</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">
        <i class="ti ti-logout"></i> Logout
      </button>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('depts')">
        <i class="ti ti-building"></i> Departments
      </button>
      <button class="tab-btn" onclick="switchTab('forms')">
        <i class="ti ti-forms"></i> Forms
      </button>
      <button class="tab-btn" onclick="switchTab('notice')">
        <i class="ti ti-speakerphone"></i> Notice
      </button>
    </div>

    <!-- Tab: Departments -->
    <div class="tab-content" id="tab-depts" style="display:block">
      <div class="section-header">
        <h3>All Departments</h3>
        <button class="btn-add" onclick="newDept()"><i class="ti ti-plus"></i> Add</button>
      </div>
      <div id="adminDeptList"></div>
    </div>

    <!-- Tab: Forms -->
    <div class="tab-content" id="tab-forms">
      <div class="section-header">
        <h3>All Forms</h3>
        <button class="btn-add" onclick="newForm()"><i class="ti ti-plus"></i> Add</button>
      </div>
      <div class="filter-row">
        <select id="formDeptFilter" onchange="renderAdminForms()">
          <option value="">All Departments</option>
        </select>
      </div>
      <div id="adminFormList"></div>
    </div>

    <!-- Tab: Notice -->
    <div class="tab-content" id="tab-notice">
      <div class="section-header">
        <h3>Notice Board</h3>
      </div>
      <div class="notice-form">
        <textarea id="noticeInput" placeholder="Notice likhein jo employees ko dikhna chahiye..."></textarea>
        <button class="btn-save" id="saveNoticeBtn" onclick="saveNotice()">
          <i class="ti ti-check"></i> Save Notice
        </button>
      </div>
    </div>

  </div>

  <!-- ── DEPT MODAL ── -->
  <div class="modal-overlay" id="deptModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="deptModalTitle">Add Department</div>
        <button class="modal-close" onclick="closeModal('deptModal')"><i class="ti ti-x"></i></button>
      </div>
      <div class="form-group">
        <label>ID (lowercase, no spaces)</label>
        <input type="text" id="deptId" placeholder="e.g. store, dispatch" />
      </div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="deptName" placeholder="e.g. Store" />
      </div>
      <div class="form-group">
        <label>Icon (Tabler icon name)</label>
        <input type="text" id="deptIcon" placeholder="e.g. ti-package" />
      </div>
      <div class="form-group">
        <label>Color</label>
        <input type="color" id="deptColor" value="#185FA5" />
      </div>
      <div class="form-group">
        <label>Order</label>
        <input type="number" id="deptOrder" value="99" />
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('deptModal')">Cancel</button>
        <button class="btn-save" id="saveDeptBtn" onclick="saveDept()">Save</button>
      </div>
    </div>
  </div>

  <!-- ── FORM MODAL ── -->
  <div class="modal-overlay" id="formModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="formModalTitle">Add Form</div>
        <button class="modal-close" onclick="closeModal('formModal')"><i class="ti ti-x"></i></button>
      </div>
      <input type="hidden" id="formId" />
      <div class="form-group">
        <label>Department</label>
        <select id="formDeptId"></select>
      </div>
      <div class="form-group">
        <label>Form Name</label>
        <input type="text" id="formName" placeholder="e.g. Raw Material Inward Form" />
      </div>
      <div class="form-group">
        <label>Form URL</label>
        <input type="url" id="formUrl" placeholder="https://docs.google.com/forms/..." />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="formType">
          <option value="Google Form">Google Form</option>
          <option value="Web Form">Web Form</option>
        </select>
      </div>
      <div class="form-group">
        <label>Order</label>
        <input type="number" id="formOrder" value="99" />
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('formModal')">Cancel</button>
        <button class="btn-save" id="saveFormBtn" onclick="saveForm()">Save</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
