<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Litpax Departments Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <div id="errorMsg">
    <i class="ti ti-wifi-off" style="font-size:28px;display:block;margin-bottom:8px"></i>
    Data load nahi hua. Page refresh karein.
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">LT</div>
      <div class="topbar-name">Litpax</div>
      <div class="topbar-divider"></div>
      <div class="topbar-page">Departments Hub</div>
    </div>
    <div class="topbar-right">
      <button class="lang-pill" onclick="toggleLang()">
        <i class="ti ti-language" aria-hidden="true"></i>
        <span id="langBtnText">हिंदी</span>
      </button>
      <a href="admin.html" class="admin-btn">
        <i class="ti ti-settings" aria-hidden="true"></i>
        <span>Admin</span>
      </a>
    </div>
  </div>

  <!-- NOTICE BOARD -->
  <div class="notice-board" id="noticeBanner">
    <div class="notice-inner">
      <div class="notice-left">
        <div class="notice-icon-wrap">
          <i class="ti ti-speakerphone" aria-hidden="true"></i>
        </div>
        <div>
          <div class="notice-label">Notice</div>
          <div class="notice-text" id="noticeText"></div>
        </div>
      </div>
      <button class="notice-close" onclick="document.getElementById('noticeBanner').style.display='none'">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <!-- DEPT VIEW -->
  <div id="deptView">
    <div class="page">
      <div class="page-eyebrow" id="companyEyebrow">Litpax Technology</div>
      <div class="page-title">Departments <span>—</span></div>
      <div class="page-sub" id="pageSub">Select your department and fill the form</div>
      <div class="dept-grid" id="deptGrid"></div>
    </div>
  </div>

  <!-- FORMS VIEW -->
  <div class="forms-view" id="formsView">
    <div class="forms-nav">
      <span onclick="goBack()">Home</span>
      <i class="ti ti-chevron-right" aria-hidden="true"></i>
      <span id="breadcrumb" style="color:#37352f;font-weight:500;"></span>
    </div>
    <div class="forms-page">
      <div class="fp-header">
        <div class="fp-icon" id="fpIcon"></div>
        <div>
          <div class="fp-title" id="fpTitle"></div>
          <div class="fp-sub" id="fpSub"></div>
        </div>
      </div>
      <table class="form-table" id="formTable"></table>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
